<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beast Kai</title>

<link rel="stylesheet" href="styles.css">

</head>

<body>

<header>
<h1>Beast Kai</h1>

<nav>
<button data-tab="builder">Team Builder</button>
<button data-tab="wiki">Wiki</button>
<button data-tab="battle">Battle</button>
<button data-tab="rules">Rules</button>
</nav>

</header>

<main>

<section id="builder" class="tab">
<h2>Team Builder</h2>
<div id="builderContainer"></div>
</section>

<section id="wiki" class="tab" style="display:none;">
<h2>Wiki</h2>
<input id="wikiSearch" placeholder="Search beasts...">
<div id="wikiResults"></div>
</section>

<section id="battle" class="tab" style="display:none;">
<h2>Battle Simulator</h2>
<button id="startBattle">Start Battle</button>
<div id="battleBoard"></div>
<div id="battleLog"></div>
</section>

<section id="rules" class="tab" style="display:none;">
<h2>Game Rules</h2>
<p>Beast Kai uses permanent doubles battles.</p>
</section>

</main>

<script src="data_bundle.js"></script>
<script src="app.js"></script>

</body>
</html>
