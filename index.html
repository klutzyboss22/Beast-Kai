<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beast Kai</title>

<link rel="stylesheet" href="assets/styles.css">

</head>

<body>

<div class="app">

<header class="topbar">
  <h1>Beast Kai</h1>
</header>

<div class="layout">

<!-- LEFT PANEL -->
<div class="sidebar">
  <button data-tab="builder">Team Builder</button>
  <button data-tab="wiki">Wiki</button>
  <button data-tab="battle">Battle</button>
</div>

<!-- MAIN PANEL -->
<div class="main">

<!-- BUILDER -->
<section id="builder" class="tab">
  <h2>Team Builder</h2>
  <div id="builderContainer"></div>
</section>

<!-- WIKI -->
<section id="wiki" class="tab hidden">
  <h2>Wiki</h2>
  <input id="wikiSearch" placeholder="Search beasts...">
  <div id="wikiResults"></div>
</section>

<!-- BATTLE -->
<section id="battle" class="tab hidden">

<div class="battle-layout">

  <!-- FIELD -->
  <div class="battlefield">

    <div class="side enemy">
      <div class="beast-slot">Enemy 1</div>
      <div class="beast-slot">Enemy 2</div>
    </div>

    <div class="side player">
      <div class="beast-slot">Player 1</div>
      <div class="beast-slot">Player 2</div>
    </div>

  </div>

  <!-- RIGHT PANEL -->
  <div class="battle-ui">

    <div class="controls">
      <button id="startBattle">Start</button>
      <button id="attackBtn">Attack</button>
      <button id="swapBtn">Switch</button>
      <button id="blockBtn">Block</button>
    </div>

    <div id="battleLog" class="log"></div>

  </div>

</div>

</section>

</div>
</div>
</div>

<script src="assets/data_bundle.js"></script>
<script src="assets/app.js"></script>

<script>
document.querySelectorAll(".sidebar button").forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll(".tab").forEach(t => t.classList.add("hidden"));
    document.getElementById(btn.dataset.tab).classList.remove("hidden");
  };
});
</script>

</body>
</html>
