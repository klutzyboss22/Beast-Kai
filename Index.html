<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beast Kai</title>

<link rel="stylesheet" href="assets/styles.css">
</head>

<body>

<div class="app">

<header class="topbar">
  <h1>Beast Kai</h1>
</header>

<div class="layout">

<div class="sidebar">
  <button data-tab="battle">Battle</button>
</div>

<div class="main">

<section id="battle" class="tab">

<div class="battle-layout">

  <div class="battlefield">

    <div class="side enemy">
      <div id="enemy1" class="beast-slot"></div>
      <div id="enemy2" class="beast-slot"></div>
    </div>

    <div class="side player">
      <div id="player1" class="beast-slot"></div>
      <div id="player2" class="beast-slot"></div>
    </div>

  </div>

  <div class="battle-ui">

    <div class="controls">
      <button id="startBattle">Start</button>
      <button id="attackBtn">Attack</button>
      <button id="swapBtn">Switch</button>
      <button id="blockBtn">Block</button>
    </div>

    <div id="battleLog" class="log"></div>

  </div>

</div>

</section>

</div>
</div>
</div>

<script src="assets/data_bundle.js"></script>
<script src="assets/app.js"></script>

</body>
</html>
